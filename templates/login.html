{% extends "base.html" %}
{% block title %}Login — SecureAuth{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <div class="logo">🛡️</div>
        <h1>Welcome Back</h1>
        <p class="subtitle">Secure Login System</p>
    </div>

    <form method="POST" action="/login" autocomplete="off">

        <!-- Username -->
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username"
                   placeholder="Enter your username" required />
        </div>

        <!-- Password -->
        <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrap">
                <input type="password" id="password" name="password"
                       placeholder="Enter your password" required />
                <span class="toggle-pw" onclick="toggleVisibility('password')">👁</span>
            </div>
        </div>

        <button type="submit" class="btn-primary">Log In</button>
    </form>

    <p class="switch-link">Don't have an account? <a href="/register">Register</a></p>
</div>
{% endblock %}
